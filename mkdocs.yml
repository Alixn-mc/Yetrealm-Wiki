site_name: Yetrealm Wiki
site_description: "Yetrealm official bilingual Wiki: dimensions, bosses, gear, Curios accessories, Skill Tree, and modpack configuration"
site_author: Alixn / Yetrealm Wiki Team
site_url: https://alixn-mc.github.io/Yetrealm-Wiki/
repo_url: https://github.com/Alixn-mc/Yetrealm-Wiki
repo_name: Alixn-mc/Yetrealm-Wiki
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/yetrealm/textures/item/astral_keystone.png
  favicon: assets/yetrealm/textures/item/astral_keystone.png
  palette:
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - assets/stylesheets/yetrealm.css

extra:
  alternate:
    - name: English
      link: https://alixn-mc.github.io/Yetrealm-Wiki/
      lang: en
    - name: 中文
      link: https://alixn-mc.github.io/Yetrealm-Wiki/zh/
      lang: zh

nav:
  - Home: index.md
  - English:
      - Getting Started:
          - Overview: en/getting-started/overview.md
          - Installation: en/getting-started/installation.md
          - Progression Route: en/getting-started/progression.md
      - Dimensions:
          - Ancient Universe: en/dimensions/ancient-universe.md
          - Astral Realm: en/dimensions/astral-realm.md
          - Portals and Astral Beacon: en/dimensions/portals.md
          - Biomes and Worldgen: en/dimensions/biomes.md
      - Systems:
          - World Difficulty: en/systems/world-difficulty.md
          - Skill Tree: en/systems/skill-tree.md
          - Elite Mobs and Reward Boxes: en/systems/elite-mobs.md
          - Curios Slots: en/systems/curios.md
          - Cosmic Cube: en/systems/cosmic-cube.md
          - HUD, Food, and Experience: en/systems/hud-food.md
      - Catalog:
